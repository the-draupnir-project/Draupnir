name: "GHCR - Latest"

on:
  release:
    types: [released]

env:
  PLATFORMS: linux/amd64,linux/arm64
  IMG_SOURCE: ${{ github.repository }}${{ github.ref_name }}

jobs:
  ghcr-latest:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      packages: write
      contents: read
      attestations: write
    steps:
      - name: Check out
        uses: actions/checkout@v4
      - name: Get release tag
        run: echo "RELEASE_VERSION=${GITHUB_REF#refs/*/}" >> $GITHUB_ENV
      - name: Unshallow for git describe so we can create version.txt
        run: git fetch --prune --unshallow --tags --all --force

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: ${{ env.PLATFORMS }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image to GHCR
        id: push_ghcr
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ env.PLATFORMS }}
          push: true
          labels: |
            org.opencontainers.image.source=${{ env.IMG_SOURCE }}
            org.opencontainers.image.licenses=AFL-3.0
          sbom: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/draupnir:latest
