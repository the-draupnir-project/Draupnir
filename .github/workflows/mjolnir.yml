name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "20 20 * * *"
  merge_group:
    branches: [main]
env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Specifically use node 24 like in the readme.
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: package-lock.json
      - run: corepack enable
      - run: corepack npm install
      - run: corepack npm run build:all
      - run: corepack npm run lint
  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Specifically use node 24 like in the readme.
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: package-lock.json
      - name: Install dependencies and show native postinstall output
        run: corepack npm install --foreground-scripts
      - name: Diagnose matrix-sdk-crypto native binding
        run: |
          node --version
          corepack npm --version
          node - <<'NODE'
          const { existsSync } = require("node:fs");
          const { dirname, join } = require("node:path");

          const cryptoEntry = require.resolve("@matrix-org/matrix-sdk-crypto-nodejs");
          const cryptoDirectory = dirname(cryptoEntry);
          const nativeBinding = join(
            cryptoDirectory,
            "matrix-sdk-crypto.linux-x64-gnu.node"
          );
          let fallbackPackage;
          try {
            fallbackPackage = require.resolve(
              "@matrix-org/matrix-sdk-crypto-nodejs-linux-x64-gnu"
            );
          } catch (error) {
            fallbackPackage = error.code;
          }

          console.log({
            platform: process.platform,
            arch: process.arch,
            glibc: process.report.getReport().header.glibcVersionRuntime,
            cryptoEntry,
            nativeBinding,
            nativeBindingExists: existsSync(nativeBinding),
            fallbackPackage,
          });

          if (!existsSync(nativeBinding) && fallbackPackage === "MODULE_NOT_FOUND") {
            throw new Error(
              "matrix-sdk-crypto postinstall neither downloaded its native binding nor installed its fallback package"
            );
          }
          NODE
      - run: corepack npm run build:all
      - run: corepack npm run test
  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: package-lock.json
      - name: Fetch and build mx-tester (cached across runs)
        uses: baptiste0928/cargo-install@v3
        with:
          crate: mx-tester
          version: "0.3.3"
      - name: Setup dependencies
        run: corepack npm install && corepack npm run build:all
      - name: Setup image
        run: RUST_LOG=debug,hyper=info,rusttls=info mx-tester build up
      - name: Run tests
        run: RUST_LOG=debug,hyper=info,rusttls=info mx-tester run
      - name: Cleanup
        run: mx-tester down
  appservice-integration:
    name: Application Service Integration tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: package-lock.json
      - name: Fetch and build mx-tester (cached across runs)
        uses: baptiste0928/cargo-install@v3
        with:
          crate: mx-tester
          version: "0.3.3"
      - name: Setup dependencies
        run: corepack npm install && corepack npm run build:all
      - name: Setup image
        run: RUST_LOG=debug,hyper=info,rusttls=info mx-tester build up
      - name: Run tests
        run: corepack npm run -w apps/draupnir test:appservice:integration
      - name: Cleanup
        run: mx-tester down
