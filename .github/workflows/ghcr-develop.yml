name: "GHCR - Develop"

on:
  push:
    branches:
      - main

env:
  PLATFORMS: linux/amd64,linux/arm64
  PUSH: ${{ github.ref == 'refs/heads/main' }}
  IMG_SOURCE: https://github.com/${{ github.repository }}

jobs:
  ghcr-develop:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      packages: write
      contents: read
      attestations: write
    steps:
      - name: Check out
        uses: actions/checkout@v4
      - name: Unshallow for git describe so we can create version.txt
        run: git fetch --prune --unshallow --tags --all --force

      # Needed for multi platform builds
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: ${{ env.PLATFORMS }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image to GHCR
        id: push_ghcr
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ env.PLATFORMS }}
          push: ${{ env.PUSH }}
          labels: |
            org.opencontainers.image.source=${{ env.IMG_SOURCE }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ github.ref_name }}
            org.opencontainers.image.licenses=AFL-3.0
          sbom: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/draupnir:develop
